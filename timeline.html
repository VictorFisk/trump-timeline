<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trump Timeline — Visual Graphic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #0f0e0d;
      --paper: #f5f0e8;
      --paper-dark: #ede7d5;
      --gold: #b5960a;
      --pos: #1a6b3a;
      --pos-bg: #e8f5ee;
      --neg: #c0392b;
      --neg-bg: #fbeaea;
      --neu: #777;
      --neu-bg: #f0ede5;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--paper); color: var(--ink); font-family: 'Source Serif 4', Georgia, serif; min-height: 100vh; }

    /* Masthead */
    .masthead { background: var(--ink); color: var(--paper); padding: 16px 24px; border-bottom: 4px solid var(--gold); display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .masthead-title { font-family: 'Playfair Display', serif; font-size: clamp(1.3rem, 3vw, 2rem); font-weight: 900; letter-spacing: -0.02em; }
    .masthead-title span { color: var(--gold); }
    .nav-btn { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; padding: 7px 15px; border-radius: 2px; cursor: pointer; text-decoration: none; transition: all 0.15s; }
    .nav-btn.outline { background: transparent; border: 1px solid #555; color: #aaa; }
    .nav-btn.outline:hover { border-color: var(--gold); color: var(--gold); }
    .nav-btn.current { background: var(--gold); border: 1px solid var(--gold); color: var(--ink); font-weight: 500; }

    /* Legend */
    .legend-bar { background: var(--paper-dark); border-bottom: 1px solid #c8bfa8; padding: 11px 24px; display: flex; align-items: center; justify-content: center; gap: 28px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-family: 'IBM Plex Mono', monospace; font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.08em; color: #888; }
    .ldot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

    /* Filters */
    .main { max-width: 960px; margin: 0 auto; padding: 28px 20px 80px; }
    .filter-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 28px; flex-wrap: wrap; }
    .fbtn { font-family: 'IBM Plex Mono', monospace; font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.08em; padding: 5px 14px; border: 1px solid #bbb; border-radius: 2px; cursor: pointer; background: transparent; color: var(--ink); transition: all 0.15s; }
    .fbtn:hover { background: #eee; }
    .fbtn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .fbtn.pos.active { background: var(--pos); border-color: var(--pos); }
    .fbtn.neg.active { background: var(--neg); border-color: var(--neg); }
    .fbtn.neu.active { background: var(--neu); border-color: var(--neu); }

    /* SVG dots get cursor pointer */
    .tl-dot { cursor: pointer; }
    .tl-label { cursor: pointer; }

    /* Popups */
    .popup {
      position: fixed;
      z-index: 300;
      width: 280px;
      background: #fff;
      border: 1px solid #ddd5c0;
      border-radius: 5px;
      padding: 15px 17px 13px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.13);
      opacity: 0;
      pointer-events: none;
      transform: translateY(5px);
      transition: opacity 0.17s, transform 0.17s;
    }
    .popup.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .popup-close { position: absolute; top: 7px; right: 10px; background: none; border: none; font-size: 17px; cursor: pointer; color: #bbb; line-height: 1; padding: 2px 4px; }
    .popup-close:hover { color: var(--ink); }
    .popup-type { font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.12em; color: #bbb; margin-bottom: 4px; }
    .popup-date { font-family: 'IBM Plex Mono', monospace; font-size: 0.63rem; color: #bbb; margin-bottom: 6px; }
    .popup-headline { font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700; line-height: 1.35; color: var(--ink); margin-bottom: 8px; }
    .popup-text { font-size: 0.8rem; color: #555; line-height: 1.65; margin-bottom: 10px; }
    .popup-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .popup-badge { font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 9px; border-radius: 2px; font-weight: 500; }
    .popup-badge.positive { background: var(--pos-bg); color: var(--pos); }
    .popup-badge.negative { background: var(--neg-bg); color: var(--neg); }
    .popup-badge.neutral  { background: var(--neu-bg); color: var(--neu); }
    .popup-score { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: #999; }
    .score-bar-wrap { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .score-bar-track { flex: 1; height: 5px; border-radius: 3px; background: linear-gradient(to right, var(--neg), #ccc 50%, var(--pos)); position: relative; }
    .score-bar-thumb { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 10px; height: 10px; border-radius: 50%; background: var(--ink); border: 2px solid #fff; }
    .score-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: #888; min-width: 28px; text-align: right; }

    footer { background: var(--ink); color: #888; text-align: center; padding: 22px; font-family: 'IBM Plex Mono', monospace; font-size: 0.63rem; letter-spacing: 0.08em; text-transform: uppercase; border-top: 3px solid var(--gold); }
    @media (max-width: 600px) { .masthead { flex-direction: column; align-items: flex-start; } .legend-bar { gap: 14px; } }
  </style>
</head>
<body>

<header class="masthead">
  <h1 class="masthead-title">Trump<span>Timeline</span></h1>
  <nav style="display:flex;gap:10px;align-items:center">
    <a href="index.html" class="nav-btn outline">◀ News Archive</a>
    <span class="nav-btn current">Visual Timeline</span>
  </nav>
</header>

<div class="legend-bar">
  <div class="legend-item"><div class="ldot" style="background:var(--pos)"></div>← Positive — left</div>
  <div class="legend-item"><div class="ldot" style="background:var(--neu)"></div>Neutral — centre</div>
  <div class="legend-item">Negative — right →<div class="ldot" style="background:var(--neg)"></div></div>
</div>

<main class="main">
  <div class="filter-row">
    <button class="fbtn active" data-f="all">All</button>
    <button class="fbtn pos" data-f="positive">🟢 Positive</button>
    <button class="fbtn neg" data-f="negative">🔴 Negative</button>
    <button class="fbtn neu" data-f="neutral">⚪ Neutral</button>
  </div>
  <div id="timeline-wrap"></div>
</main>

<!-- Popup: Summary (shown when clicking headline text) -->
<div class="popup" id="popup-summary">
  <button class="popup-close" id="close-summary">×</button>
  <div class="popup-type">News Summary</div>
  <div class="popup-date" id="ps-date"></div>
  <div class="popup-headline" id="ps-headline"></div>
  <div class="popup-text" id="ps-summary"></div>
  <div class="popup-footer">
    <span class="popup-badge" id="ps-badge"></span>
    <span class="popup-score" id="ps-source"></span>
  </div>
</div>

<!-- Popup: Sentiment (shown when clicking dot) -->
<div class="popup" id="popup-sentiment">
  <button class="popup-close" id="close-sentiment">×</button>
  <div class="popup-type">Sentiment Analysis</div>
  <div class="popup-date" id="psen-date"></div>
  <div class="popup-headline" id="psen-headline"></div>
  <div class="popup-text" id="psen-reason"></div>
  <div class="score-bar-wrap">
    <span style="font-family:'IBM Plex Mono',monospace;font-size:0.58rem;color:#bbb">−10</span>
    <div class="score-bar-track"><div class="score-bar-thumb" id="psen-thumb"></div></div>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:0.58rem;color:#bbb">+10</span>
    <span class="score-label" id="psen-score"></span>
  </div>
</div>

<footer>Trump Timeline — Powered by Claude AI — Updates every Monday</footer>

<script>
  let NEWS = [];
  let activeFilter = 'all';

  async function init() {
    try {
      const res = await fetch('data/news.json?t=' + Date.now());
      NEWS = await res.json();
    } catch(e) {
      NEWS = [
        { id:1,  date:"2017-01-20", headline:"Trump Inaugurated as 45th President", source:"AP", summary:"Donald Trump sworn in as 45th President. Inaugural address focused on 'America First' themes.", sentiment:"neutral",  sentimentScore:0,  sentimentReason:"A factual milestone with mixed coverage — celebrations alongside widespread protests." },
        { id:2,  date:"2017-01-27", headline:"Travel Ban Sparks Airport Protests", source:"Reuters", summary:"Executive order banning travelers from seven Muslim-majority countries triggered nationwide protests and legal challenges.", sentiment:"negative", sentimentScore:-7, sentimentReason:"Coverage focused on chaos, protests, and legal challenges from civil liberties groups." },
        { id:3,  date:"2017-04-07", headline:"U.S. Launches Missile Strike on Syria", source:"BBC", summary:"59 Tomahawk missiles fired at Syrian airbase after chemical attack killing dozens of civilians.", sentiment:"neutral",  sentimentScore:1,  sentimentReason:"Mixed coverage — decisive action praised by allies, but escalation risks questioned." },
        { id:4,  date:"2018-06-12", headline:"Historic Singapore Summit with Kim Jong-un", source:"NYT", summary:"First sitting U.S. president to meet a North Korean leader. Joint statement on denuclearization signed.", sentiment:"positive", sentimentScore:6,  sentimentReason:"Widely covered as a historic diplomatic breakthrough, even among skeptical outlets." },
        { id:5,  date:"2019-12-18", headline:"House Impeaches Trump for Abuse of Power", source:"Washington Post", summary:"Trump became the third U.S. president impeached by the House over a Ukraine phone call. Senate later acquitted.", sentiment:"negative", sentimentScore:-8, sentimentReason:"Predominantly negative framing centered on abuse of power and constitutional crisis language." },
        { id:6,  date:"2020-03-13", headline:"National Emergency Declared Over COVID-19", source:"Reuters", summary:"Trump declared COVID-19 a national emergency, freeing up $50 billion in federal funds for response efforts.", sentiment:"neutral",  sentimentScore:-2, sentimentReason:"Action was welcomed but heavily scrutinized over the delayed federal response." },
        { id:7,  date:"2020-11-07", headline:"Biden Declared Winner of 2020 Election", source:"AP", summary:"Major networks called the 2020 election for Joe Biden. Trump refused to concede, alleging widespread fraud without evidence.", sentiment:"negative", sentimentScore:-6, sentimentReason:"Fraud allegations described as baseless by courts and election officials drove negative framing." },
        { id:8,  date:"2021-01-06", headline:"Capitol Stormed by Trump Supporters", source:"NYT", summary:"Supporters stormed the U.S. Capitol during Electoral College certification, resulting in deaths and injuries.", sentiment:"negative", sentimentScore:-10, sentimentReason:"Universally condemned across the political spectrum as an assault on democracy. Led to Trump's second impeachment." },
        { id:9,  date:"2023-06-09", headline:"Trump Indicted on Federal Charges", source:"AP", summary:"Trump became the first former U.S. president to face federal charges — 37 counts related to mishandling classified documents.", sentiment:"negative", sentimentScore:-8, sentimentReason:"Historic negative milestone — first federal indictment of a former president dominated coverage." },
        { id:10, date:"2024-07-13", headline:"Trump Survives Assassination Attempt", source:"Reuters", summary:"Trump was grazed by a bullet during a campaign rally in Butler, PA. One attendee was killed and the shooter was neutralized.", sentiment:"neutral",  sentimentScore:0,  sentimentReason:"Shock and bipartisan condemnation of political violence balanced the gravity of the event." },
        { id:11, date:"2024-11-06", headline:"Trump Wins 2024 Presidential Election", source:"AP", summary:"Trump defeated VP Kamala Harris, becoming the first president since Grover Cleveland to win non-consecutive terms.", sentiment:"positive", sentimentScore:8,  sentimentReason:"Historic political comeback widely acknowledged as a remarkable achievement even by critical outlets." },
        { id:12, date:"2025-01-20", headline:"Trump Inaugurated as 47th President", source:"Reuters", summary:"Trump began his second term, signing a flurry of executive orders on Day 1 covering immigration, energy and the federal workforce.", sentiment:"neutral",  sentimentScore:2,  sentimentReason:"Inauguration is a neutral milestone; rapid executive orders drew both strong support and sharp criticism." }
      ];
    }
    NEWS.sort((a,b) => new Date(a.date) - new Date(b.date));
    render();
  }

  const COL = { positive:'#1a6b3a', negative:'#c0392b', neutral:'#777' };

  const W           = 900;
  const CX          = W / 2;
  const DOT_OFF     = 60;
  const DOT_R       = 9;
  const ROW_H       = 64;
  const TOP         = 48;
  const BOT         = 40;
  const X_POS_DOT   = CX - DOT_OFF;
  const X_NEG_DOT   = CX + DOT_OFF;
  const X_NEU_DOT   = CX;
  const X_POS_LABEL = X_POS_DOT - DOT_R - 12;
  const X_NEG_LABEL = X_NEG_DOT + DOT_R + 12;
  const X_NEU_LABEL = X_NEU_DOT + DOT_R + 12;

  function render() {
    const filtered = activeFilter === 'all' ? NEWS : NEWS.filter(n => n.sentiment === activeFilter);
    const sorted   = [...filtered].sort((a,b) => new Date(a.date) - new Date(b.date));
    const totalH   = TOP + sorted.length * ROW_H + BOT;

    // Build SVG as a string (no inline event handlers)
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('id', 'tl-svg');
    svg.setAttribute('width', '100%');
    svg.setAttribute('viewBox', `0 0 ${W} ${totalH}`);
    svg.style.display = 'block';

    // Helper to create SVG elements
    function el(tag, attrs) {
      const e = document.createElementNS(ns, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    }
    function txt(content, attrs) {
      const e = el('text', attrs);
      e.textContent = content;
      return e;
    }

    // Era bands
    const eraColors = ['rgba(0,0,0,0.025)', 'rgba(0,0,0,0)', 'rgba(0,0,0,0.025)'];
    [
      { from:'2017-01-01', to:'2021-01-20' },
      { from:'2021-01-20', to:'2025-01-20' },
      { from:'2025-01-20', to:'2099-01-01' }
    ].forEach((era, ei) => {
      const si = sorted.findIndex(n => new Date(n.date) >= new Date(era.from));
      const ei2 = sorted.findIndex(n => new Date(n.date) >= new Date(era.to));
      if (si < 0) return;
      const y1 = TOP + si * ROW_H;
      const y2 = ei2 >= 0 ? TOP + ei2 * ROW_H : totalH - BOT;
      if (y2 > y1) svg.appendChild(el('rect', { x:0, y:y1, width:W, height:y2-y1, fill:eraColors[ei] }));
    });

    // Centre line
    svg.appendChild(el('line', { x1:CX, y1:TOP, x2:CX, y2:totalH-BOT, stroke:'#d0c8b8', 'stroke-width':'1' }));

    // Year markers
    [2017,2018,2019,2020,2021,2022,2023,2024,2025,2026].forEach(yr => {
      const fi = sorted.findIndex(n => new Date(n.date).getUTCFullYear() === yr);
      if (fi < 0) return;
      const y = TOP + fi * ROW_H - 2;
      if (y < TOP + 8) return;
      svg.appendChild(el('line', { x1:0, y1:y, x2:W, y2:y, stroke:'#e0d8cc', 'stroke-width':'0.5' }));
      const pill = el('rect', { x:CX-20, y:y-9, width:40, height:17, rx:3, fill:'#ede7d5' });
      svg.appendChild(pill);
      svg.appendChild(txt(String(yr), { x:CX, y:y+5, 'text-anchor':'middle', 'font-size':'10', 'font-family':'IBM Plex Mono, monospace', fill:'#aaa', 'letter-spacing':'0.05em' }));
    });

    // Events
    sorted.forEach((item, i) => {
      const y   = TOP + i * ROW_H + ROW_H / 2;
      const col = COL[item.sentiment];

      let dotX, labelX, anchor;
      if (item.sentiment === 'positive') {
        dotX = X_POS_DOT; labelX = X_POS_LABEL; anchor = 'end';
      } else if (item.sentiment === 'negative') {
        dotX = X_NEG_DOT; labelX = X_NEG_LABEL; anchor = 'start';
      } else {
        dotX = X_NEU_DOT; labelX = X_NEU_LABEL; anchor = 'start';
      }

      // Date label (inner side of dot)
      const dateLabel  = fmtShort(item.date);
      const dateLabelX = item.sentiment === 'positive' ? dotX + DOT_R + 5 : dotX - DOT_R - 5;
      const dateAnchor = item.sentiment === 'positive' ? 'start' : 'end';
      const dateEl = txt(dateLabel, {
        x: dateLabelX, y: y+4, 'text-anchor': dateAnchor,
        'font-size':'9', 'font-family':'IBM Plex Mono, monospace', fill:'#c0b8a8'
      });
      svg.appendChild(dateEl);

      // Headline label — truncated to fit column
      const maxW    = item.sentiment === 'positive' ? X_POS_LABEL - 8 : W - X_NEG_LABEL - 8;
      const maxChars = Math.floor(maxW / 6.8);
      let label = item.headline;
      if (label.length > maxChars) label = label.slice(0, maxChars - 1) + '…';

      const labelEl = txt(label, {
        x: labelX, y: y+4, 'text-anchor': anchor,
        'font-size':'12', 'font-family':'Source Serif 4, Georgia, serif',
        fill:'#555', 'font-weight':'400',
        'data-id': item.id, 'data-action': 'summary'
      });
      labelEl.style.cursor = 'pointer';
      labelEl.addEventListener('click', (e) => { e.stopPropagation(); showSummary(item, dotX, y); });
      svg.appendChild(labelEl);

      // Dot
      const dotEl = el('circle', {
        cx: dotX, cy: y, r: DOT_R, fill: col,
        'data-id': item.id, 'data-action': 'sentiment'
      });
      dotEl.style.cursor = 'pointer';
      dotEl.addEventListener('mouseenter', () => dotEl.setAttribute('r', DOT_R + 3));
      dotEl.addEventListener('mouseleave', () => dotEl.setAttribute('r', DOT_R));
      dotEl.addEventListener('click', (e) => { e.stopPropagation(); showSentiment(item, dotX, y); });
      svg.appendChild(dotEl);
    });

    const wrap = document.getElementById('timeline-wrap');
    wrap.innerHTML = '';
    wrap.appendChild(svg);
  }

  // ── Show Summary popup (click on headline text) ──
  function showSummary(item, dotX, dotY) {
    closeAll();
    document.getElementById('ps-date').textContent     = fmtFull(item.date);
    document.getElementById('ps-headline').textContent = item.headline;
    document.getElementById('ps-summary').textContent  = item.summary;
    const badge = document.getElementById('ps-badge');
    badge.textContent = item.sentiment.charAt(0).toUpperCase() + item.sentiment.slice(1);
    badge.className   = 'popup-badge ' + item.sentiment;
    document.getElementById('ps-source').textContent   = item.source || '';
    positionPopup('popup-summary', dotX, dotY);
  }

  // ── Show Sentiment popup (click on dot) ──
  function showSentiment(item, dotX, dotY) {
    closeAll();
    document.getElementById('psen-date').textContent    = fmtFull(item.date);
    document.getElementById('psen-headline').textContent = item.headline;
    document.getElementById('psen-reason').textContent  = item.sentimentReason || 'No analysis available.';
    const pct  = ((item.sentimentScore + 10) / 20 * 100).toFixed(0);
    document.getElementById('psen-thumb').style.left    = pct + '%';
    const sign = item.sentimentScore > 0 ? '+' : '';
    document.getElementById('psen-score').textContent   = sign + item.sentimentScore;
    positionPopup('popup-sentiment', dotX, dotY);
  }

  function positionPopup(id, dotX, dotY) {
    const popup   = document.getElementById(id);
    const svgEl   = document.getElementById('tl-svg');
    if (!svgEl) return;
    const svgRect = svgEl.getBoundingClientRect();
    const vbH     = parseFloat(svgEl.getAttribute('viewBox').split(' ')[3]);
    const scaleX  = svgRect.width  / W;
    const scaleY  = svgRect.height / vbH;

    let px = svgRect.left + dotX * scaleX + window.scrollX;
    let py = svgRect.top  + dotY * scaleY + window.scrollY;

    const pW = 280; const pH = 220;
    px = (px + pW + 20 > window.innerWidth) ? px - pW - 16 : px + 16;
    py = (py + pH > window.innerHeight + window.scrollY) ? py - pH + 20 : py - 20;

    popup.style.left = Math.max(8, px) + 'px';
    popup.style.top  = Math.max(8, py) + 'px';
    popup.classList.add('visible');
  }

  function closeAll() {
    document.getElementById('popup-summary').classList.remove('visible');
    document.getElementById('popup-sentiment').classList.remove('visible');
  }

  document.getElementById('close-summary').addEventListener('click', closeAll);
  document.getElementById('close-sentiment').addEventListener('click', closeAll);
  document.addEventListener('click', e => {
    if (!e.target.closest('.popup') && !e.target.closest('#timeline-wrap')) closeAll();
  });

  document.querySelectorAll('.fbtn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.f;
      closeAll();
      render();
    });
  });

  function fmtShort(d) {
    return new Date(d + 'T12:00:00Z').toLocaleDateString('en-US',
      { month:'short', day:'numeric', timeZone:'UTC' });
  }
  function fmtFull(d) {
    return new Date(d + 'T12:00:00Z').toLocaleDateString('en-US',
      { month:'long', day:'numeric', year:'numeric', timeZone:'UTC' });
  }

  init();
</script>
</body>
</html>
